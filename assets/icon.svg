<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#58a6ff"/>
      <stop offset="100%" stop-color="#a371f7"/>
    </linearGradient>
    <linearGradient id="up" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#26a69a"/>
      <stop offset="100%" stop-color="#3fb950"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect x="0" y="0" width="512" height="512" rx="100" ry="100" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.08">
    <line x1="100" y1="200" x2="412" y2="200" stroke="#58a6ff" stroke-width="1"/>
    <line x1="100" y1="280" x2="412" y2="280" stroke="#58a6ff" stroke-width="1"/>
    <line x1="100" y1="360" x2="412" y2="360" stroke="#58a6ff" stroke-width="1"/>
    <line x1="150" y1="120" x2="150" y2="400" stroke="#58a6ff" stroke-width="1"/>
    <line x1="250" y1="120" x2="250" y2="400" stroke="#58a6ff" stroke-width="1"/>
    <line x1="350" y1="120" x2="350" y2="400" stroke="#58a6ff" stroke-width="1"/>
  </g>

  <!-- Stock trend line (candlestick-inspired upward zigzag) -->
  <g fill="none" stroke="url(#up)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="120,350 180,350 180,280 240,280 240,200 300,200 300,150 360,150 360,130"/>
  </g>

  <!-- Candlestick bodies on the trend -->
  <rect x="165" y="330" width="30" height="40" rx="3" fill="#26a69a" opacity="0.9"/>
  <rect x="225" y="260" width="30" height="40" rx="3" fill="#26a69a" opacity="0.9"/>
  <rect x="285" y="180" width="30" height="40" rx="3" fill="#26a69a" opacity="0.9"/>
  <rect x="345" y="130" width="30" height="30" rx="3" fill="#26a69a" opacity="0.9"/>

  <!-- Wick lines -->
  <line x1="180" y1="320" x2="180" y2="380" stroke="#26a69a" stroke-width="3" opacity="0.7"/>
  <line x1="240" y1="250" x2="240" y2="310" stroke="#26a69a" stroke-width="3" opacity="0.7"/>
  <line x1="300" y1="170" x2="300" y2="230" stroke="#26a69a" stroke-width="3" opacity="0.7"/>
  <line x1="360" y1="115" x2="360" y2="170" stroke="#26a69a" stroke-width="3" opacity="0.7"/>

  <!-- Monn "M" letter mark in accent gradient -->
  <text x="256" y="450" text-anchor="middle" font-family="'SF Pro Display', -apple-system, sans-serif"
        font-size="72" font-weight="800" fill="url(#accent)" letter-spacing="4">
    MONN
  </text>
</svg>
